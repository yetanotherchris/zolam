services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ${ZOLAM_DATA_DIR:-./.zolam}/chromadb:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  ingest:
    image: ghcr.io/yetanotherchris/zolam:latest
    environment:
      - COLLECTION_NAME=${COLLECTION_NAME:-my-notes}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    profiles:
      - ingest
