name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          # Every leg builds natively on a matching-architecture runner —
          # CGO is enabled (DuckDB, MuPDF, Tesseract, ONNX Runtime bindings
          # all need a real C compiler), and cross-compiling CGO against
          # system libraries like Tesseract is fragile, so cross-arch
          # legs from earlier (linux-arm64 from an amd64 runner, for
          # instance) were switched to native arm64/amd64 runners instead.
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # Read the required version from go.mod (currently 1.25.0)
          # instead of pinning it here, so the two can't drift out of
          # sync — setup-go@v6 sets GOTOOLCHAIN=local when go-version
          # is pinned explicitly, which blocks Go's usual toolchain
          # auto-download and turns a stale pin into a hard failure.
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Install Tesseract/Leptonica dev libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtesseract-dev libleptonica-dev pkg-config

      - name: Install Tesseract/Leptonica dev libraries (macOS)
        if: runner.os == 'macOS'
        env:
          # The macOS runner image ships with taps (e.g. aws/tap) that
          # Homebrew's tap-trust model doesn't trust by default; brew
          # warns about them on every invocation even though we only
          # install from homebrew-core. See https://docs.brew.sh/Tap-Trust
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          brew install tesseract pkg-config
          # gosseract's cgo bridge has no #cgo CFLAGS/LDFLAGS of its own and
          # relies on the compiler's default search paths, which don't
          # include Homebrew's prefix (especially /opt/homebrew on Apple
          # Silicon) — point CGO at it explicitly.
          echo "CGO_CFLAGS=-I$(brew --prefix)/include" >> "$GITHUB_ENV"
          echo "CGO_CXXFLAGS=-I$(brew --prefix)/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L$(brew --prefix)/lib" >> "$GITHUB_ENV"

      - name: Set up MSYS2 (Windows CGO toolchain + Tesseract/Leptonica)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          # setup-go installs Go on the Windows PATH, which the MSYS2
          # shell doesn't see by default (path-type: minimal) — the
          # subsequent "shell: msys2 {0}" build step needs `go` on PATH.
          path-type: inherit
          install: >-
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-rust
            mingw-w64-x86_64-tesseract-ocr
            mingw-w64-x86_64-leptonica
            mingw-w64-x86_64-pkg-config

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # daulet/tokenizers only publishes prebuilt libtokenizers.a for
      # linux/darwin (see its .github/workflows/release.yml) — there's no
      # windows-amd64 release asset, so fetchnative's download 404s. Build
      # the static lib ourselves from the same tagged source with the
      # MSYS2 MinGW toolchain (matching the GNU ABI the Go bindings expect
      # on windows: `#cgo windows LDFLAGS: -ltokenizers -lm -lstdc++
      # -lws2_32 -luserenv`) and drop it where fetchnative would have
      # written it; fetchnative then sees the file and skips its download.
      - name: Build libtokenizers.a from source (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        working-directory: src
        run: |
          set -e
          TOK_VERSION=$(awk '/daulet\/tokenizers/ {print $2}' go.mod)
          echo "Building daulet/tokenizers $TOK_VERSION for windows-amd64"
          git clone --depth 1 --branch "$TOK_VERSION" https://github.com/daulet/tokenizers.git /tmp/tokenizers-src
          cargo build --release --manifest-path /tmp/tokenizers-src/Cargo.toml -p tokenizers-ffi
          mkdir -p native/tokenizers
          cp /tmp/tokenizers-src/target/release/libtokenizers_ffi.a native/tokenizers/libtokenizers.a

      - name: Fetch native tokenizers library
        working-directory: src
        run: go run ./tools/fetchnative

      - name: Build (Windows, via MSYS2 MinGW shell)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        working-directory: src
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags="-X main.version=${{ steps.version.outputs.VERSION }} -s -w" -o zolam.exe ./cmd/zolam/

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: src
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags="-X main.version=${{ steps.version.outputs.VERSION }} -s -w" -o zolam ./cmd/zolam/

      - name: Rename binary (unix)
        if: matrix.goos != 'windows'
        run: mv src/zolam zolam-${{ matrix.suffix }}

      - name: Rename binary (windows)
        if: matrix.goos == 'windows'
        run: mv src/zolam.exe zolam-${{ matrix.suffix }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: zolam-${{ matrix.suffix }}
          path: zolam-${{ matrix.suffix }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

      - name: Switch to main branch
        run: |
          git checkout main
          git pull --rebase origin main

      - name: Update Scoop manifest
        shell: pwsh
        run: ./updatescoop.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Commit updated Scoop manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update scoop manifest to ${{ github.ref_name }}"
          file_pattern: zolam.json
