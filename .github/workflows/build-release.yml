name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # windows-amd64 is marked experimental (continue-on-error above)
      # and is expected to fail sometimes — without fail-fast: false,
      # GitHub Actions cancels the other still-running matrix legs the
      # moment that job's steps report failure (continue-on-error only
      # stops it from failing the overall run; it doesn't stop the
      # fail-fast cancellation of siblings), which took out a healthy
      # macos-13 leg and skipped the release job in a past run.
      fail-fast: false
      matrix:
        include:
          # Every leg builds natively on a matching-architecture runner —
          # CGO is enabled (SQLite/sqlite-vec, MuPDF, Tesseract, ONNX Runtime
          # bindings all need a real C compiler), and cross-compiling CGO
          # against system libraries like Tesseract is fragile, so cross-arch
          # legs from earlier (linux-arm64 from an amd64 runner, for
          # instance) were switched to native arm64/amd64 runners instead.
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            suffix: linux-arm64
          - os: macos-13
            goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          # windows-amd64 is marked experimental (continue-on-error
          # below): DuckDB used to be the blocker here (its Windows static
          # libs pulled in undefined UCRT/emulated-TLS symbols this
          # workflow couldn't resolve) but that's gone now that the vector
          # index is SQLite + sqlite-vec, which compiles its own C source
          # directly into the binary with no external static libs to link
          # against. What's untested on Windows is go-fitz's bundled MuPDF
          # static lib, which has its own history of undefined UCRT/Clang
          # (__intrinsic_setjmpex) symbols. Left experimental until a real
          # Windows run confirms the whole chain links cleanly. Until it
          # fully passes, the windows-amd64 release binary is built
          # manually and committed to artifacts/zolam-windows-amd64.exe —
          # the release job picks it up from there if present.
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: windows-amd64
            experimental: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          # Read the required version from go.mod (currently 1.25.0)
          # instead of pinning it here, so the two can't drift out of
          # sync — setup-go@v6 sets GOTOOLCHAIN=local when go-version
          # is pinned explicitly, which blocks Go's usual toolchain
          # auto-download and turns a stale pin into a hard failure.
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Install Tesseract/Leptonica dev libraries (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtesseract-dev libleptonica-dev pkg-config

      - name: Install Tesseract/Leptonica dev libraries (macOS)
        if: runner.os == 'macOS'
        env:
          # The macOS runner image ships with taps (e.g. aws/tap) that
          # Homebrew's tap-trust model doesn't trust by default; brew
          # warns about them on every invocation even though we only
          # install from homebrew-core. See https://docs.brew.sh/Tap-Trust
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          brew install tesseract pkg-config
          # gosseract's cgo bridge has no #cgo CFLAGS/LDFLAGS of its own and
          # relies on the compiler's default search paths, which don't
          # include Homebrew's prefix (especially /opt/homebrew on Apple
          # Silicon) — point CGO at it explicitly.
          echo "CGO_CFLAGS=-I$(brew --prefix)/include" >> "$GITHUB_ENV"
          echo "CGO_CXXFLAGS=-I$(brew --prefix)/include" >> "$GITHUB_ENV"
          echo "CGO_LDFLAGS=-L$(brew --prefix)/lib" >> "$GITHUB_ENV"

      # Tesseract/Leptonica dev libs only — the actual C compiler for
      # Windows now comes from Scoop's mingw package (below), not from
      # MSYS2. Using UCRT64 rather than MINGW64 here matters: MINGW64
      # targets the legacy msvcrt.dll instead of UCRT — UCRT64 and
      # Scoop's mingw (also a UCRT build, see build-libtokenizers.ps1)
      # keep the whole toolchain on one consistent CRT.
      - name: Set up MSYS2 (Tesseract/Leptonica dev libs)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          install: >-
            mingw-w64-ucrt-x86_64-tesseract-ocr
            mingw-w64-ucrt-x86_64-leptonica
            mingw-w64-ucrt-x86_64-pkg-config

      # The MSYS2 install path varies by runner (seen at both C:\msys64
      # and D:\a\_temp\msys64), so resolve it once here via cygpath
      # rather than hardcoding it in the pwsh build step below.
      - name: Resolve MSYS2 UCRT64 path
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: echo "UCRT64_ROOT=$(cygpath -m /ucrt64)" >> "$GITHUB_ENV"

      - name: Install Scoop
        if: runner.os == 'Windows'
        uses: MinoruSekine/setup-scoop@v5

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      # daulet/tokenizers only publishes prebuilt libtokenizers.a for
      # linux/darwin (see its .github/workflows/release.yml) — there's no
      # windows-amd64 release asset, so fetchnative's download 404s. Build
      # the static lib ourselves via build-libtokenizers.ps1 (repo root),
      # which installs Rust through Scoop (GNU host target) and a plain
      # MinGW-w64 GCC through Scoop's "mingw" package — no MSYS2 involved
      # for this piece, since that's what was actually breaking here
      # (dlltool.exe not found; MSYS2's PATH wasn't reaching the build
      # reliably). fetchnative below sees the resulting file and skips its
      # own download.
      - name: Build libtokenizers.a from source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tokVersion = (Select-String -Path src\go.mod -Pattern 'daulet/tokenizers\s+(\S+)').Matches[0].Groups[1].Value
          .\build-libtokenizers.ps1 -TokenizersVersion $tokVersion -OutputPath src\native\tokenizers\libtokenizers.a

          # Scoop's own PATH update is registry-level (persistent) but
          # this job's later steps are separate processes that won't
          # pick that up automatically — export it via GITHUB_PATH so
          # the "Build (Windows)" step below can find gcc/g++.
          "$HOME\scoop\apps\mingw\current\bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          "$HOME\scoop\shims" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Fetch native tokenizers library
        working-directory: src
        run: go run ./tools/fetchnative

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: src
        env:
          CGO_ENABLED: "1"
        run: |
          # gosseract's cgo bridge hardcodes -L/usr/local/lib for its
          # tesseract/leptonica LDFLAGS, which doesn't exist here — the
          # MSYS2 UCRT64 packages installed above live under the
          # ucrt64 prefix instead. Point CGO at it explicitly (same
          # fix as the macOS leg above, adapted for MSYS2's path).
          # MSYS2's leptonica package only ships an import library
          # (libleptonica.dll.a, no true static libleptonica.a), which
          # ld resolves fine under the default dynamic-preferred search
          # mode — this used to need forcing back on with -Wl,-Bdynamic
          # because DuckDB's own #cgo LDFLAGS put ld into static-only
          # mode first, but DuckDB is gone now (replaced by SQLite +
          # sqlite-vec, which link cleanly with no such flag).
          #
          # -lntdll: the Rust tokenizers staticlib calls NT syscalls
          # (NtReadFile etc.) directly; rustc normally adds -lntdll
          # automatically when linking, but Go's linker does the
          # actual final link here and has no idea that's needed.
          $env:CGO_CFLAGS = "-I$env:UCRT64_ROOT/include"
          $env:CGO_CXXFLAGS = "-I$env:UCRT64_ROOT/include"
          $env:CGO_LDFLAGS = "-L$env:UCRT64_ROOT/lib -lntdll"
          go build -ldflags="-X main.version=${{ steps.version.outputs.VERSION }} -s -w" -o zolam.exe ./cmd/zolam/

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: src
        env:
          CGO_ENABLED: "1"
        run: go build -ldflags="-X main.version=${{ steps.version.outputs.VERSION }} -s -w" -o zolam ./cmd/zolam/

      - name: Rename binary (unix)
        if: matrix.goos != 'windows'
        run: mv src/zolam zolam-${{ matrix.suffix }}

      - name: Rename binary (windows)
        if: matrix.goos == 'windows'
        run: mv src/zolam.exe zolam-${{ matrix.suffix }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: zolam-${{ matrix.suffix }}
          path: zolam-${{ matrix.suffix }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      # windows-amd64 isn't built by the matrix above (see the comment
      # there) — it's built manually and committed to this path so it
      # rides along in the release. download-artifact merges into the
      # same directory without touching files already there, so this
      # just needs to exist before the release step runs; warn instead
      # of failing so a missing Windows build doesn't block a release.
      - name: Check for manually-built Windows binary
        run: |
          if [ -f artifacts/zolam-windows-amd64.exe ]; then
            echo "Found artifacts/zolam-windows-amd64.exe — including it in the release."
          else
            echo "::warning::artifacts/zolam-windows-amd64.exe not found — this release will ship without a Windows binary."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

      - name: Switch to main branch
        run: |
          git checkout main
          git pull --rebase origin main

      - name: Update Scoop manifest
        shell: pwsh
        run: ./updatescoop.ps1 -Version ${{ steps.version.outputs.VERSION }}

      - name: Commit updated Scoop manifest
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update scoop manifest to ${{ github.ref_name }}"
          file_pattern: zolam.json
