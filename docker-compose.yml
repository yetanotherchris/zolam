services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  ingest:
    image: ghcr.io/yetanotherchris/ingester:latest
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - chromadb-data:/data
    depends_on:
      - chromadb
    profiles:
      - ingest

volumes:
  chromadb-data:
